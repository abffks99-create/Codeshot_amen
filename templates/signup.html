<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#2E90FA">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CodeShot — 회원가입</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo">
      <svg style="width:56px;height:56px;" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="16" width="18" height="16" rx="8" fill="none" stroke="#2E90FA" stroke-width="3"/>
        <rect x="26" y="16" width="18" height="16" rx="8" fill="none" stroke="#2E90FA" stroke-width="3"/>
        <line x1="23" y1="24" x2="25" y2="24" stroke="#2E90FA" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
        <path d="M26 10L21 25H26L21 38" stroke="#F04438" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>회원가입</h1>
      <p>정보를 입력하고 서비스를 시작하세요</p>
    </div>
    {% if error %}<div class="msg-error">⚠ {{ error }}</div>{% endif %}
    <form method="POST" action="/signup" onsubmit="return checkPw()">
      <div class="form-group"><label>아이디</label><input type="text" name="id" placeholder="영문·숫자 조합, 최대 50자" maxlength="50" required></div>
      <div class="form-group"><label>비밀번호</label><input type="password" name="pwd" id="pwd" placeholder="8자 이상" minlength="8" required></div>
      <div class="form-group"><label>비밀번호 확인</label><input type="password" id="pwd2" placeholder="비밀번호 재입력" required><span class="hint" id="pw-msg"></span></div>
      <div class="form-group"><label>이름</label><input type="text" name="name" placeholder="이름을 입력하세요" required></div>
      <div class="form-group"><label>이메일</label><input type="email" name="email" placeholder="이메일을 입력하세요" required></div>
      <div class="form-group"><label>연락처</label><input type="tel" name="phone" placeholder="010-0000-0000" required></div>
      <button type="submit" class="btn btn-primary" style="margin-top:8px;">가입 완료</button>
    </form>
    <div class="bottom-link" style="margin-top:14px;">이미 계정이 있으신가요? <a href="/login">로그인</a></div>
  </div>
</div>
<script>
function checkPw(){const p1=document.getElementById('pwd').value,p2=document.getElementById('pwd2').value;if(p1!==p2){document.getElementById('pw-msg').textContent='✗ 비밀번호가 일치하지 않습니다';document.getElementById('pw-msg').style.color='#F04438';return false;}return true;}
document.getElementById('pwd2').addEventListener('input',function(){const p1=document.getElementById('pwd').value,msg=document.getElementById('pw-msg');if(this.value&&this.value===p1){msg.textContent='✓ 일치합니다';msg.style.color='#12B76A';}else if(this.value){msg.textContent='✗ 일치하지 않습니다';msg.style.color='#F04438';}else msg.textContent='';});
</script>
</body>
</html>
