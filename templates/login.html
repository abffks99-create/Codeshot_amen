<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#2E90FA">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CodeShot — 로그인</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo">
      <svg style="width:56px;height:56px;" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="16" width="18" height="16" rx="8" fill="none" stroke="#2E90FA" stroke-width="3"/>
        <rect x="26" y="16" width="18" height="16" rx="8" fill="none" stroke="#2E90FA" stroke-width="3"/>
        <line x1="23" y1="24" x2="25" y2="24" stroke="#2E90FA" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
        <path d="M26 10L21 25H26L21 38" stroke="#F04438" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>CodeShot</h1>
      <p>피싱 의심되면, 바로 진단하세요</p>
    </div>
    {% if error %}<div class="msg-error">⚠ {{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="id" placeholder="아이디를 입력하세요" required autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="pwd" placeholder="비밀번호를 입력하세요" required>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:8px;">로그인</button>
    </form>
    <div class="divider"><div class="divider-line"></div><span class="divider-text">또는</span><div class="divider-line"></div></div>
    <a href="/signup" class="btn btn-secondary">회원가입</a>
    <div class="bottom-link">비밀번호를 잊으셨나요? <a href="#">재설정</a></div>
  </div>
</div>
</body>
</html>
