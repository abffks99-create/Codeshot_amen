<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#2E90FA">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CodeShot — 이미지 분석</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .apple-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: #F9FAFB; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px; gap: 20px;
    }
    .apple-overlay.show { display: flex; }
    .tip-card {
      background: #fff; border: 2px solid #EAECF0; border-radius: 24px;
      padding: 40px 32px; width: 100%; max-width: 500px;
      text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      animation: tipFadeIn 0.5s ease both;
    }
    @keyframes tipFadeIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
    .tip-emoji { font-size: 64px; margin-bottom: 18px; display: block; }
    .tip-title { font-size: 22px; font-weight: 800; color: #101828; margin-bottom: 12px; line-height: 1.4; word-break: keep-all; }
    .tip-desc  { font-size: 15px; color: #475467; line-height: 2.0; word-break: keep-all; word-wrap: break-word; white-space: pre-line; letter-spacing: -0.01em; }
    .tip-dots  { display:flex; gap:10px; justify-content:center; margin-top:22px; }
    .tip-dot   { width:11px; height:11px; border-radius:50%; background:#EAECF0; transition:background 0.3s; }
    .tip-dot.on { background:#2E90FA; }
    .apple-timer { font-size: 18px; font-weight: 700; color: #2E90FA; }
    .apple-bar-wrap { width: 100%; max-width: 500px; height: 8px; background: #EAECF0; border-radius: 99px; overflow: hidden; }
    .apple-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#2E90FA,#6366F1); border-radius: 99px; transition: width 1s linear; }
  </style>
</head>
<body>
<nav class="navbar">
  <a class="logo" href="/main">
    <svg class="logo-svg" viewBox="0 0 48 48" fill="none"><rect x="4" y="16" width="18" height="16" rx="8" fill="none" stroke="#2E90FA" stroke-width="3"/><rect x="26" y="16" width="18" height="16" rx="8" fill="none" stroke="#2E90FA" stroke-width="3"/><line x1="23" y1="24" x2="25" y2="24" stroke="#2E90FA" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/><path d="M26 10L21 25H26L21 38" stroke="#F04438" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="logo-text">CodeShot</span>
  </a>
  <div class="nav-links">
    <a href="/main">홈</a><a href="/crawl">URL 분석</a><a href="/upload">이미지 분석</a>
    <a href="/alerts">알림</a><a href="/mypage">{{ session['user_name'] }}</a>
    <a href="/logout" class="btn-logout">로그아웃</a>
  </div>
</nav>

<!-- 로딩 오버레이 -->
<div class="apple-overlay" id="apple-overlay">
  <div class="tip-card" id="tip-card">
    <span class="tip-emoji" id="tip-emoji">🖼</span>
    <div class="tip-title" id="tip-title">잠깐! 피싱 예방 TIP</div>
    <div class="tip-desc" id="tip-desc">분석하는 동안 피싱 예방 지식을 확인해보세요.</div>
    <div class="tip-dots" id="tip-dots"></div>
  </div>
  <div class="apple-timer" id="timer-text">약 15초 남음</div>
  <div class="apple-bar-wrap"><div class="apple-bar-fill" id="bar-fill"></div></div>
  <div style="font-size:13px;color:#98A2B3;font-weight:600;">분석 완료 시 자동으로 결과 화면으로 이동해요</div>
</div>
<div class="container">
  <div class="card">
    <div class="page-title">이미지 분석</div>
    {% if error %}<div class="msg-error">⚠ {{ error }}</div>{% endif %}
    <form method="POST" action="/upload" enctype="multipart/form-data" id="upload-form">
      <label class="upload-zone" for="file-input" id="upload-zone">
        <span class="upload-icon" id="upload-icon">📎</span>
        <div class="upload-label">클릭 · 드래그 · Ctrl+V 로 업로드</div>
        <div class="upload-hint">PNG, JPG, GIF, BMP, WEBP 등 모든 이미지 지원</div>
        <div id="file-name" style="margin-top:10px;font-size:13px;color:#2E90FA;font-weight:600;"></div>
        <img id="preview-img" src="" alt="" style="max-width:100%;max-height:200px;margin-top:12px;border-radius:8px;display:none;">
      </label>
      <input type="file" id="file-input" name="file" accept="image/*" style="display:none;" onchange="showFile(this)">
      <button type="submit" class="btn btn-primary" style="margin-top:16px;">🔍 분석 시작</button>
    </form>
  </div>
  <!-- 자동 순환 안내 카드 (A5 스타일) -->
  <div style="border-radius:12px;overflow:hidden;border:1.5px solid #FECDCA;border-left:5px solid #F04438;">
    <div style="background:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #FECDCA;">
      <span style="font-size:18px;flex-shrink:0;">⚠️</span>
      <span style="font-size:14px;font-weight:700;color:#101828;word-break:keep-all;line-height:1.5;">AI 분석은 참고용 — 최종 판단은 본인이 직접 하세요</span>
    </div>
    <div style="background:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;min-height:72px;box-sizing:border-box;">
      <div style="width:38px;height:38px;border-radius:10px;background:#F9FAFB;border:1px solid #EAECF0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:opacity 0.35s;" id="up-icon">🛡</div>
      <span style="font-size:14px;color:#344054;line-height:1.75;flex:1;word-break:keep-all;white-space:nowrap;overflow:hidden;transition:opacity 0.35s;" id="up-text"></span>
    </div>
    <div style="background:#F9FAFB;border-top:1px solid #FECDCA;padding:9px 18px;display:flex;gap:5px;align-items:center;" id="up-dots"></div>
  </div>
</div>

<script>
const UP_TIPS = [
  { icon:'🛡', text:'의심스러운 이미지(문자 캡처, 앱 화면 등)를 업로드하면 AI가 피싱 여부를 분석해요.' },
  { icon:'⏱', text:'분석에 약 20~40초 소요됩니다. 완료되면 자동으로 결과 화면으로 이동해요.' },
  { icon:'🔒', text:'이미지는 분석 후 서버에 저장되지 않아요. 안심하고 사용하세요.' },
  { icon:'📞', text:'피싱이 의심되면 한국인터넷진흥원(KISA) 118로 즉시 신고하세요.' },
  { icon:'🏦', text:'금융기관은 절대 문자로 앱 설치나 개인정보를 요구하지 않아요.' },
  { icon:'🚨', text:'링크를 눌렀다면 즉시 비행기 모드로 전환하고 금융사에 연락하세요.' },
];
let upIdx = 0, upTimer = null;
function fitUp(el, text) {
  el.textContent = text;
  let size = 14;
  el.style.fontSize = size + 'px';
  while (el.scrollWidth > el.offsetWidth && size > 10) { size -= 0.5; el.style.fontSize = size + 'px'; }
}
function renderUp(i, reset) {
  const icon = document.getElementById('up-icon');
  const text = document.getElementById('up-text');
  const dots = document.getElementById('up-dots');
  icon.style.opacity = text.style.opacity = '0';
  setTimeout(() => { icon.textContent = UP_TIPS[i].icon; fitUp(text, UP_TIPS[i].text); icon.style.opacity = text.style.opacity = '1'; }, 320);
  dots.innerHTML = '';
  UP_TIPS.forEach((_, j) => {
    const d = document.createElement('div');
    d.style.cssText = `height:6px;border-radius:99px;cursor:pointer;transition:all 0.3s;background:${j===i?'#F04438':'#FECDCA'};width:${j===i?'18px':'6px'};`;
    d.onclick = () => { upIdx=j; renderUp(j, true); };
    dots.appendChild(d);
  });
  if (reset) { clearInterval(upTimer); upTimer = setInterval(() => { upIdx=(upIdx+1)%UP_TIPS.length; renderUp(upIdx); }, 3000); }
}
renderUp(0, true);

function showFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = '📁 ' + file.name;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('preview-img');
    img.src = e.target.result; img.style.display = 'block';
    document.getElementById('upload-icon').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// 드래그앤드롭
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor='#2E90FA'; zone.style.background='#EFF8FF'; });
zone.addEventListener('dragleave', () => { zone.style.borderColor=''; zone.style.background=''; });
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.style.borderColor=''; zone.style.background='';
  if (e.dataTransfer.files.length) {
    const input = document.getElementById('file-input');
    input.files = e.dataTransfer.files; showFile(input);
  }
});

// Ctrl+V
document.addEventListener('paste', e => {
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (let item of items) {
    if (item.type.indexOf('image') !== -1) {
      const blob = item.getAsFile();
      const file = new File([blob], 'pasted_image.png', {type: blob.type});
      const dt = new DataTransfer(); dt.items.add(file);
      const input = document.getElementById('file-input');
      input.files = dt.files; showFile(input);
      break;
    }
  }
});

// Apple 로딩 애니메이션
const TOTAL = 15; // 예상 소요 시간(초)
const steps = [
  { at: 0,  text: '이미지를 업로드하는 중...' },
  { at: 20, text: 'AI가 이미지를 분석하는 중...' },
  { at: 50, text: '피싱 패턴을 확인하는 중...' },
  { at: 80, text: '분석 결과를 정리하는 중...' },
  { at: 95, text: '거의 다 됐어요!' },
];

const TIPS = [
  { emoji:'🔍', title:'URL을 꼼꼼히 확인하세요', desc:'정식 사이트와 철자 하나만 다른 도메인을 사용하는 게\n피싱의 전형적인 수법이에요.\n예) naver.com → naver-login.com' },
  { emoji:'🔒', title:'자물쇠(HTTPS)만 믿지 마세요', desc:'HTTPS라도 피싱 사이트일 수 있어요.\n주소창의 도메인 이름 자체가\n올바른지 반드시 직접 확인하세요.' },
  { emoji:'📲', title:'문자·카톡 링크는 특히 주의하세요', desc:'금융기관·공공기관은 문자로\n로그인 링크를 절대 보내지 않아요.\n의심스러우면 공식 앱으로 직접 접속하세요.' },
  { emoji:'🎁', title:'"당첨됐어요!"는 99% 피싱이에요', desc:'이벤트 당첨, 택배 미수령 등의 문자는\n피싱의 대표적인 사례예요.\n링크를 클릭하기 전 반드시 출처를 확인하세요.' },
  { emoji:'🧠', title:'개인정보 입력 전 한 번 더 확인하세요', desc:'아이디·비밀번호·주민번호를 요구하면\n공식 사이트가 맞는지 먼저 확인하세요.\n정상 기관은 한 번에 모두 요구하지 않아요.' },
  { emoji:'📞', title:'모르는 번호도 피싱일 수 있어요', desc:'보이스피싱은 금감원·경찰·검찰을 사칭해요.\n의심되면 즉시 전화를 끊고\n해당 기관의 공식 번호로 직접 전화하세요.' },
  { emoji:'🏦', title:'금융 정보는 공식 앱에서만 입력하세요', desc:'은행·카드사는 공식 앱 스토어에서\n다운로드한 앱으로만 이용하세요.\n검색 광고 속 링크도 위험할 수 있어요.' },
];

let tipIdx = 0;

function renderTip(idx) {
  const t = TIPS[idx];
  const card = document.getElementById('tip-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'tipFadeIn 0.5s ease both';
  document.getElementById('tip-emoji').textContent = t.emoji;
  document.getElementById('tip-title').textContent = t.title;
  document.getElementById('tip-desc').textContent  = t.desc;
  const dots = document.getElementById('tip-dots');
  dots.innerHTML = '';
  TIPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'tip-dot' + (i === idx ? ' on' : '');
    dots.appendChild(d);
  });
}

document.getElementById('upload-form').addEventListener('submit', function(e) {
  const input = document.getElementById('file-input');
  if (!input.files.length) return;

  document.getElementById('apple-overlay').classList.add('show');

  tipIdx = 0;
  renderTip(tipIdx);
  setInterval(() => {
    tipIdx = (tipIdx + 1) % TIPS.length;
    renderTip(tipIdx);
  }, 3000);

  let elapsed = 0;
  const bar   = document.getElementById('bar-fill');
  const timer = document.getElementById('timer-text');

  const interval = setInterval(() => {
    elapsed++;
    const pct = Math.min((elapsed / TOTAL) * 100, 98);
    bar.style.width = pct + '%';
    const remaining = Math.max(TOTAL - elapsed, 1);
    timer.textContent = `약 ${remaining}초 남음`;
    if (elapsed >= TOTAL * 3) clearInterval(interval);
  }, 1000);
});
</script>
  <nav class="mobile-bottom-nav">
    <a href="/main">
      <span>🏠</span>홈
    </a>
    <a href="/upload">
      <span>🖼</span>이미지
    </a>
    <a href="/crawl">
      <span>🔗</span>URL
    </a>
    <a href="/alerts">
      <span>🔔</span>알림
    </a>
    <a href="/mypage">
      <span>👤</span>내정보
    </a>
  </nav>
</body>
</html>
